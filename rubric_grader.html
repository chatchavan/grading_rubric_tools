<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grading</title>
    <link rel="stylesheet" href="rubric_grader.css">
</head>
<body>
    <div class="container">
        <div class="student-info">
            <div style="margin-bottom: 20px;">
                <label for="rubricFile"><strong>Upload Rubric (Markdown):</strong></label>
                <input type="file" id="rubricFile" accept=".md,.markdown,.txt" onchange="loadRubricFile()" style="margin-left: 10px;">
                <button type="button" onclick="useDefaultRubric()" class="use-default-rubric-button">Use Default Rubric</button>
                <button type="button" class="clear-storage-button" onclick="clearLocalStorage()">Clear All Data</button>
            </div>
            <div style="margin-bottom: 20px;">
                <label for="jsonFileInput"><strong>Upload JSON:</strong></label>
                <input type="file" id="jsonFileInput" accept=".json" onchange="uploadJSON()">
            </div>
            <label for="studentName"><strong>Student Name:</strong></label>
            <input type="text" id="studentName" class="student-name-input" placeholder="Enter student name">
        </div>

        <form id="gradingForm">
            <div class="layout-toggle-bar">
                <button type="button" id="layoutToggleBtn" class="layout-toggle-btn" onclick="toggleLayout()">
                    <span id="layoutToggleIcon">⊟</span> Column View
                </button>
            </div>
            <div id="criteriaContainer"></div>
            <div id="validationWarning" class="validation-warning" style="display: none;">
                Please select an option for all criteria before proceeding to the next student.
            </div>
        </form>

        <div class="notes-section">
            <label for="studentNotes" class="notes-label">Notes</label>
            <textarea id="studentNotes" class="notes-textarea" placeholder="Add notes for this student…" oninput="saveCurrentStudentData()"></textarea>
        </div>

        <div class="score-display" id="scoreDisplay">
            Total Score: Select all criteria to see score
        </div>

        <div class="navigation">
            <button type="button" class="nav-button" id="backButton" onclick="navigateStudent(-1)">← Previous Student</button>
            <div class="student-counter" id="studentCounter">Student 1</div>
            <button type="button" class="nav-button" id="nextButton" onclick="navigateStudent(1)">Next Student →</button>
        </div>

        <div class="download-section">
            <h3 style="text-align: center; margin-bottom: 16px;">Download Results</h3>
            <div class="pdf-meta">
                <span class="pdf-meta-label">PDF header:</span>
                <input type="text" id="courseName" class="pdf-meta-input" placeholder="Course name" oninput="savePdfMeta()">
                <input type="text" id="assignmentName" class="pdf-meta-input" placeholder="Assignment name" oninput="savePdfMeta()">
            </div>
            <div class="download-buttons">
                <button type="button" class="download-button" onclick="downloadCSV()">Download CSV</button>
                <button type="button" class="download-button" onclick="downloadJSON()">Download JSON</button>
                <button type="button" class="download-button" onclick="downloadMarkdownZip()">Download Markdown (ZIP)</button>
                <button type="button" class="download-button" onclick="downloadPDFZip()">Download PDF (ZIP)</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/rubric.js"></script>
    <script src="js/students.js"></script>
    <script src="js/scoring.js"></script>
    <script src="js/download.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
